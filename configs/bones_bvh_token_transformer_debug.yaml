experiment:
  name: bones_bvh_token_transformer_debug
  project: OnlineRetarget
  seed: 17
  output_root: runs

data:
  root: /home/user/data/motion_data
  index_csv: runs/indices/bones_sonic_index_full_v0/sonic_index.csv
  samples_jsonl: runs/supervised/somabvh_task_train_h8_stride10_limit5000/samples.jsonl
  allow_debug_data: true
  source_format: soma_proportional_bvh_fk
  target_format: bones_sonic_joint_pos
  history_frames: 8
  source_body_count: 30
  task: debug

model:
  family: token_transformer
  latent_dim: 128
  nhead: 4
  num_encoder_layers: 2
  num_decoder_layers: 2
  dim_feedforward: 512
  dropout: 0.1
  output_mode: position
  use_prev_state: true
  output: g1_joint_position

loss:
  l1: 1.0
  token_autoencoder:
    skeleton: 0.05
    motion: 0.01
    state: 0.05
    latent_alignment: 0.0

train:
  batch_size: 256
  max_steps: 20
  learning_rate: 0.0003
  precision: fp32
  ddp: true
  log_every: 5
  eval_every: 0

evaluation:
  metrics:
    - joint_mae
    - joint_mse
    - joint_rmse
    - max_joint_abs_error
    - joint_velocity_rmse
    - action_similarity
    - predicted_joint_jump_rate
    - target_joint_jump_rate
    - predicted_minus_target_joint_jump_rate
  failure_metric: joint_rmse
  joint_jump_velocity: 20.0
  max_failures: 50

tracking:
  wandb_mode: disabled
  auto_offline_eval: true

run:
  dry_run: false
  allow_debug_data: true
  output_dir: ""
  predict_only: false
  checkpoint: ""
  limit: 1
