experiment:
  name: bones_bvh_mlp_5000traj_4090
  project: OnlineRetarget
  seed: 17
  output_root: runs

data:
  root: /home/user/data/motion_data
  index_csv: runs/indices/bones_sonic_index_full_v0/sonic_index.csv
  train_samples_jsonl: runs/supervised/somabvh_task_train_h8_stride10_limit5000/samples.jsonl
  val_samples_jsonl: runs/supervised/somabvh_task_val_h8_stride10_limit1000/samples.jsonl
  samples_jsonl: runs/supervised/somabvh_task_train_h8_stride10_limit5000/samples.jsonl
  allow_debug_data: true
  source_format: soma_proportional_bvh_fk
  target_format: bones_sonic_joint_pos
  split_group_by: actor_uid
  task_query: ""
  history_frames: 8
  source_body_count: 30
  window_stride: 10
  max_windows_per_clip: 1

model:
  family: temporal_mlp
  hidden_dims: [2048, 2048, 1024, 512]
  activation: silu
  dropout: 0.02
  output: g1_joint_position
  temporal_context: flattened_history_window

loss:
  l1: 1.0

train:
  batch_size: 4096
  max_steps: 250000
  learning_rate: 0.0003
  precision: fp32
  ddp: true
  log_every: 100
  eval_every: 0

evaluation:
  metrics:
    - joint_mae
    - joint_mse
    - joint_rmse
    - max_joint_abs_error
    - joint_velocity_rmse
    - action_similarity
    - predicted_joint_jump_rate
    - target_joint_jump_rate
    - predicted_minus_target_joint_jump_rate
  failure_metric: joint_rmse
  joint_jump_velocity: 20.0
  max_failures: 100

tracking:
  wandb_mode: offline
  auto_offline_eval: true

run:
  dry_run: false
  allow_debug_data: true
  output_dir: ""
  predict_only: false
  checkpoint: ""
  limit: 1
