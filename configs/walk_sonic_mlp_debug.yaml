experiment:
  name: walk_sonic_mlp_debug
  project: OnlineRetarget
  seed: 17
  output_root: runs

data:
  root: /home/user/data/motion_data
  index_csv: runs/indices/bones_sonic_index_full_v0/sonic_index.csv
  samples_jsonl: runs/supervised/sonicbody_walk_train_h8_stride10_limit512/samples.jsonl
  allow_debug_data: true
  source_format: sonic_body_pos
  target_format: bones_sonic_joint_pos
  history_frames: 8
  task: walk

model:
  family: temporal_mlp
  hidden_dims: [256, 256]
  activation: silu
  dropout: 0.0
  output: g1_joint_position
  latency_budget_ms_4090: 1.0

loss:
  l1: 1.0

train:
  batch_size: 64
  max_steps: 20
  learning_rate: 0.0003
  precision: fp32
  ddp: false
  log_every: 5
  eval_every: 20

evaluation:
  metrics:
    - joint_mae
    - joint_mse
    - joint_rmse
    - max_joint_abs_error
    - joint_velocity_rmse
    - action_similarity
    - predicted_joint_jump_rate
    - target_joint_jump_rate
    - predicted_minus_target_joint_jump_rate
  failure_metric: joint_rmse
  joint_jump_velocity: 20.0
  max_failures: 50

tracking:
  wandb_mode: disabled
  auto_offline_eval: true
