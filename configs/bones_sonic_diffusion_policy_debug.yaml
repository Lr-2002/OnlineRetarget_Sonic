experiment:
  name: bones_sonic_diffusion_policy_debug
  project: OnlineRetarget
  seed: 17
  output_root: runs

data:
  root: /home/user/data/motion_data
  index_csv: runs/indices/bones_sonic_index_full_v0/sonic_index.csv
  samples_jsonl: runs/supervised/somabvh_walk_train_h8_fh10_stride10_limit128/samples.jsonl
  allow_debug_data: true
  source_format: soma_proportional_bvh_fk
  target_format: bones_sonic_joint_pos_future_window
  history_frames: 8
  target_horizon_frames: 10
  source_body_count: 30
  task: walk

model:
  family: diffusion_policy
  hidden_dims: [512, 512, 256]
  activation: silu
  dropout: 0.0
  time_embed_dim: 32
  diffusion_steps: 32
  inference_steps: 8
  inference_start: zeros
  output: g1_joint_position_future_window

loss:
  diffusion_policy: 1.0

train:
  batch_size: 256
  max_steps: 200
  learning_rate: 0.0003
  precision: fp32
  ddp: true
  log_every: 20
  eval_every: 200

evaluation:
  metrics:
    - joint_mae
    - joint_mse
    - joint_rmse
    - max_joint_abs_error
    - joint_velocity_rmse
    - action_similarity
    - predicted_joint_jump_rate
    - target_joint_jump_rate
    - predicted_minus_target_joint_jump_rate
  failure_metric: joint_rmse
  joint_jump_velocity: 20.0
  max_failures: 50

tracking:
  wandb_mode: disabled
  auto_offline_eval: true
